services:
  - type: web
    name: telegram-shop-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci --only=production 2>/dev/null || npm install
    startCommand: npm run start:api
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: API_PORT
        value: 4000

  - type: web
    name: telegram-shop-bot-worker
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci --only=production 2>/dev/null || npm install
    startCommand: npm run start:bot
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://telegram-shop-api.onrender.com
      - key: BOT_MODE
        value: polling
      - key: WEBHOOK_PATH
        value: /telegram/webhook
      - key: WEBHOOK_URL
        value: https://telegram-shop-bot-worker.onrender.com
      - key: WEBHOOK_SECRET_TOKEN
        sync: false
